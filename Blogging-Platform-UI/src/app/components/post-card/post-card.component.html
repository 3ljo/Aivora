<article class="post-card">
  <div class="card-glow"></div>
  <div class="card-image">
    @if (post().imageUrl) {
      <img [src]="post().imageUrl" [alt]="post().title" class="cover-image" />
    } @else {
      <div class="image-placeholder">
        <div class="placeholder-grid"></div>
        <span class="placeholder-icon">&#9671;</span>
      </div>
    }
  </div>
  <div class="card-content">
    <div class="card-header">
      <span class="category-badge">{{ post().category }}</span>
      <span class="card-date">{{ post().created_at | date:'MMM dd, yyyy' }}</span>
    </div>

    <h3 class="card-title">{{ post().title }}</h3>

    <p class="card-excerpt">{{ post().content | slice:0:150 }}{{ post().content.length > 150 ? '...' : '' }}</p>

    <div class="card-tags">
      @for (tag of post().tags; track tag) {
        <span class="tag">#{{ tag }}</span>
      }
    </div>

    <a [routerLink]="['/posts', post().id]" class="read-more">
      Read More
      <span class="arrow">&rarr;</span>
    </a>
  </div>
</article>
